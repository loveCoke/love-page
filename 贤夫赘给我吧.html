<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>贤夫赘给我吧！</title>
  <style>
    :root {
      --rose: #fb7185;
      --pink: #f9a8d4;
      --peach: #fed7aa;
      --ink: #3b1d2b;
      --paper: rgba(255, 247, 237, 0.78);
      --glass: rgba(255, 255, 255, 0.28);
      --line: rgba(255, 255, 255, 0.42);
      --shadow: 0 30px 80px rgba(136, 19, 55, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Serif SC", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.88), transparent 24%),
        radial-gradient(circle at 82% 8%, rgba(254, 215, 170, 0.86), transparent 25%),
        linear-gradient(145deg, #ffe4e6 0%, #fff1f2 36%, #fef3c7 100%);
    }

    body {
      display: grid;
      place-items: center;
      padding: 28px 18px 118px;
    }

    .stage {
      position: relative;
      width: min(1080px, 100%);
      min-height: min(820px, calc(100vh - 146px));
      display: grid;
      grid-template-columns: minmax(280px, 0.95fr) minmax(280px, 1.05fr);
      gap: clamp(18px, 3vw, 44px);
      align-items: center;
      z-index: 2;
    }

    .photo-wrap {
      position: relative;
      justify-self: center;
      width: min(460px, 100%);
      transform: rotate(-2deg);
      animation: photoFloat 6s ease-in-out infinite;
    }

    .photo-wrap::before,
    .photo-wrap::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(251, 113, 133, 0.18);
      filter: blur(1px);
      z-index: -1;
    }

    .photo-wrap::before {
      width: 170px;
      height: 170px;
      left: -46px;
      top: -38px;
    }

    .photo-wrap::after {
      width: 210px;
      height: 210px;
      right: -50px;
      bottom: -36px;
      background: rgba(249, 168, 212, 0.22);
    }

    .photo-card {
      position: relative;
      padding: 14px;
      border-radius: 32px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.72), rgba(255, 228, 230, 0.54));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .photo-card img {
      display: block;
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      object-position: 52% 47%;
      border-radius: 24px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.24);
    }

    .spark {
      position: absolute;
      display: grid;
      place-items: center;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.58);
      box-shadow: 0 12px 30px rgba(251, 113, 133, 0.22);
      font-size: 26px;
      animation: popBeat 1.5s ease-in-out infinite;
    }

    .spark.one {
      right: -16px;
      top: 12%;
    }

    .spark.two {
      left: -16px;
      bottom: 12%;
      animation-delay: 0.35s;
    }

    .copy {
      position: relative;
      padding: clamp(22px, 4vw, 42px);
      border-radius: 30px;
      background: var(--paper);
      border: 1px solid rgba(255, 255, 255, 0.64);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      width: fit-content;
      margin: 0 0 16px;
      padding: 8px 12px;
      border-radius: 999px;
      color: #9f1239;
      background: rgba(255, 228, 230, 0.88);
      border: 1px solid rgba(251, 113, 133, 0.24);
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 7vw, 88px);
      line-height: 0.98;
      letter-spacing: 0;
      color: #831843;
      text-wrap: balance;
    }

    .letter {
      margin: 22px 0 0;
      color: #6b213e;
      font-size: clamp(16px, 2.2vw, 22px);
      line-height: 1.9;
    }

    .mini-line {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    .mini-line span {
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.56);
      border: 1px solid rgba(251, 113, 133, 0.22);
      color: #9f1239;
      font-size: 14px;
      font-weight: 700;
    }

    .bottom-love {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: min(920px, calc(100% - 28px));
      z-index: 9;
      padding: 18px 22px;
      border-radius: 26px;
      text-align: center;
      color: #fff;
      background: linear-gradient(135deg, #e11d48, #fb7185 48%, #f97316);
      border: 1px solid rgba(255, 255, 255, 0.46);
      box-shadow: 0 18px 46px rgba(190, 18, 60, 0.34);
      font-size: clamp(28px, 6.4vw, 58px);
      font-weight: 900;
      line-height: 1.15;
      text-shadow: 0 4px 18px rgba(136, 19, 55, 0.35);
      animation: bottomPulse 1.35s ease-in-out infinite;
    }

    .heart-field {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .heart {
      position: absolute;
      bottom: -40px;
      left: var(--x);
      font-size: var(--size);
      opacity: 0;
      animation:
        riseHeart var(--duration) linear var(--delay) infinite,
        wobbleHeart 1.4s ease-in-out var(--delay) infinite;
      filter: drop-shadow(0 8px 12px rgba(190, 18, 60, 0.22));
    }

    .touch-button {
      appearance: none;
      border: 0;
      margin-top: 26px;
      padding: 14px 18px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, #be123c, #fb7185);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 16px 34px rgba(190, 18, 60, 0.26);
    }

    .touch-button:active {
      transform: translateY(1px) scale(0.98);
    }

    @keyframes photoFloat {
      0%,
      100% {
        transform: rotate(-2deg) translateY(0);
      }
      50% {
        transform: rotate(1.2deg) translateY(-14px);
      }
    }

    @keyframes popBeat {
      0%,
      100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.2) rotate(8deg);
      }
    }

    @keyframes bottomPulse {
      0%,
      100% {
        transform: translateX(-50%) scale(1);
      }
      50% {
        transform: translateX(-50%) scale(1.035);
      }
    }

    @keyframes riseHeart {
      0% {
        transform: translate3d(0, 0, 0) scale(0.72);
        opacity: 0;
      }
      12% {
        opacity: 0.92;
      }
      78% {
        opacity: 0.9;
      }
      100% {
        transform: translate3d(var(--drift), -112vh, 0) scale(1.25);
        opacity: 0;
      }
    }

    @keyframes wobbleHeart {
      0%,
      100% {
        margin-left: -8px;
      }
      50% {
        margin-left: 10px;
      }
    }

    @media (max-width: 860px) {
      body {
        padding-top: 18px;
      }

      .stage {
        grid-template-columns: 1fr;
        gap: 22px;
      }

      .photo-wrap {
        width: min(380px, 92vw);
      }

      .copy {
        padding: 22px;
      }
    }
  </style>
</head>

    <section class="copy">
      <p class="eyebrow">照片识别：认真吃饭的心动男主角</p>
      <h1>今晚的心跳<br>都写给你</h1>
      <p class="letter">
        戴着眼镜、低头吃饭的样子，莫名就很让人安心。<br>
        想把每一顿热乎饭、每一次冒泡的快乐、每一个小小的心动，都悄悄递到你面前。
      </p>
      <div class="mini-line">
        <span>会心动</span>
        <span>会偏心</span>
        <span>会一直喜欢</span>
      </div>
      <button class="touch-button" type="button" id="burstBtn">点一下，爱心加倍</button>

  <div class="bottom-love">贤夫赘给我吧！</div>

  <script>
    const heartField = document.getElementById('heartField');
    const burstBtn = document.getElementById('burstBtn');
    const hearts = ['💖', '💗', '💓', '💕', '💘', '❤️', '💞'];

    function createHeart(options = {}) {
      const heart = document.createElement('span');
      heart.className = 'heart';
      heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      const x = options.x ?? Math.random() * 100;
      const size = options.size ?? (24 + Math.random() * 34);
      const duration = options.duration ?? (5.8 + Math.random() * 4.5);
      const delay = options.delay ?? Math.random() * 5;
      const drift = options.drift ?? ((Math.random() - 0.5) * 180);
      heart.style.setProperty('--x', `${x}%`);
      heart.style.setProperty('--size', `${size}px`);
      heart.style.setProperty('--duration', `${duration}s`);
      heart.style.setProperty('--delay', `${delay}s`);
      heart.style.setProperty('--drift', `${drift}px`);
      heartField.appendChild(heart);
      return heart;
    }

    for (let index = 0; index < 42; index += 1) {
      createHeart();
    }

    burstBtn.addEventListener('click', () => {
      for (let index = 0; index < 18; index += 1) {
        const heart = createHeart({
          x: 42 + Math.random() * 18,
          size: 30 + Math.random() * 42,
          duration: 3.4 + Math.random() * 2.3,
          delay: 0,
          drift: (Math.random() - 0.5) * 260,
        });
        heart.addEventListener('animationiteration', () => heart.remove(), { once: true });
      }
    });
  </script>
